<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Lyric Flow</title>
        <style>
            :root {
                /* Default: Midnight Flow (Dark) */
                --bg-gradient: linear-gradient(
                    135deg,
                    #1a1c2c 0%,
                    #4a192c 100%
                );
                --glass: rgba(255, 255, 255, 0.05);
                --text: #e0e0e0;
                --accent: #ff79c6;
                --draft-text: #9ca3af;
                --border: rgba(255, 255, 255, 0.1);
                --transition-speed: 0.4s;
            }

            [data-theme="light"] {
                --bg-gradient: linear-gradient(
                    135deg,
                    #f5f7fa 0%,
                    #c3cfe2 100%
                );
                --glass: rgba(255, 255, 255, 0.7);
                --text: #2d3436;
                --accent: #6c5ce7;
                --draft-text: #636e72;
                --border: rgba(0, 0, 0, 0.1);
            }

            [data-theme="zen"] {
                --bg-gradient: linear-gradient(
                    135deg,
                    #132620 0%,
                    #0a0f0d 100%
                );
                --glass: rgba(255, 255, 255, 0.03);
                --text: #d4d7c5;
                --accent: #a3b18a;
                --draft-text: #588157;
                --border: rgba(163, 177, 138, 0.2);
            }

            [data-theme="nordic"] {
                --bg-gradient: linear-gradient(
                    135deg,
                    #2e3440 0%,
                    #4c566a 100%
                );
                --glass: rgba(255, 255, 255, 0.05);
                --text: #eceff4;
                --accent: #88c0d0;
                --draft-text: #a3be8c;
                --border: rgba(255, 255, 255, 0.1);
            }

            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            body {
                background: var(--bg-gradient);
                background-attachment: fixed;
                color: var(--text);
                font-family:
                    "Inter",
                    -apple-system,
                    sans-serif;
                min-height: 100vh;
                display: flex;
                justify-content: center;
                overflow-y: auto;
                /* QOL Transition */
                transition:
                    background var(--transition-speed) ease-in-out,
                    color var(--transition-speed) ease-in-out;
            }

            /* Visual feedback for drag and drop */
            body.drag-over .workspace {
                filter: grayscale(0.5) blur(2px);
                transform: scale(0.98);
                pointer-events: none;
            }

            .theme-switcher {
                position: fixed;
                top: 1rem;
                right: 1rem;
                display: flex;
                gap: 0.5rem;
                z-index: 100;
                background: var(--glass);
                padding: 0.5rem;
                border-radius: 20px;
                backdrop-filter: blur(5px);
                border: 1px solid var(--border);
                transition: background var(--transition-speed);
            }

            .theme-dot {
                width: 20px;
                height: 20px;
                border-radius: 50%;
                cursor: pointer;
                border: 2px solid transparent;
                transition: transform 0.2s;
            }

            .theme-dot:hover {
                transform: scale(1.2);
            }
            .theme-dot.active {
                border-color: var(--text);
            }

            .workspace {
                display: grid;
                grid-template-columns: 1fr;
                gap: 1.5rem;
                width: 95%;
                max-width: 1200px;
                padding: 4rem 0 5rem 0;
                transition: all 0.3s ease;
            }

            @media (min-width: 850px) {
                body {
                    overflow: hidden;
                }
                .workspace {
                    grid-template-columns: 1fr 300px;
                    height: 85vh;
                    align-self: center;
                    padding: 0;
                }
            }

            .main-zone,
            .draft-zone {
                transition:
                    background var(--transition-speed),
                    border var(--transition-speed);
            }

            .main-zone {
                display: flex;
                flex-direction: column;
                background: var(--glass);
                backdrop-filter: blur(10px);
                -webkit-backdrop-filter: blur(10px);
                border-radius: 12px;
                padding: 1.5rem;
                border: 1px solid var(--border);
            }

            #title {
                background: transparent;
                border: none;
                outline: none;
                color: var(--accent);
                font-size: 1.5rem;
                font-weight: 700;
                margin-bottom: 1rem;
                letter-spacing: -1px;
                width: 100%;
                transition: color var(--transition-speed);
            }

            #editor {
                flex-grow: 1;
                background: transparent;
                border: none;
                outline: none;
                color: var(--text);
                font-size: 1.1rem;
                line-height: 1.6;
                resize: none;
                font-family: inherit;
                min-height: 300px;
            }

            .draft-zone {
                display: flex;
                flex-direction: column;
                background: rgba(0, 0, 0, 0.1);
                border-radius: 12px;
                padding: 1.2rem;
                border: 1px dashed var(--border);
            }

            .draft-zone h3 {
                font-size: 0.75rem;
                text-transform: uppercase;
                letter-spacing: 2px;
                color: var(--draft-text);
                margin-bottom: 0.8rem;
            }

            #scrap-pad {
                flex-grow: 1;
                background: transparent;
                border: none;
                outline: none;
                color: var(--draft-text);
                font-size: 0.9rem;
                line-height: 1.5;
                resize: none;
                font-family: "Georgia", serif;
                font-style: italic;
                min-height: 150px;
            }

            .footer {
                position: fixed;
                bottom: 1.5rem;
                left: 50%;
                transform: translateX(-50%);
                z-index: 10;
            }

            button {
                background: var(--accent);
                color: #fff;
                border: none;
                padding: 0.8rem 1.8rem;
                border-radius: 30px;
                cursor: pointer;
                font-weight: 600;
                box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
                white-space: nowrap;
                transition: background var(--transition-speed);
            }

            ::placeholder {
                color: var(--draft-text);
                opacity: 0.5;
            }
        </style>
    </head>
    <body id="drop-target">
        <div class="theme-switcher">
            <div
                class="theme-dot"
                style="background: #1a1c2c"
                onclick="setTheme('dark')"
                title="Midnight Flow"
            ></div>
            <div
                class="theme-dot"
                style="background: #f5f7fa"
                onclick="setTheme('light')"
                title="Paper Light"
            ></div>
            <div
                class="theme-dot"
                style="background: #132620"
                onclick="setTheme('zen')"
                title="Forest Zen"
            ></div>
            <div
                class="theme-dot"
                style="background: #2e3440"
                onclick="setTheme('nordic')"
                title="Nordic Dusk"
            ></div>
        </div>

        <div class="workspace">
            <section class="main-zone">
                <input
                    type="text"
                    id="title"
                    placeholder="Untitled Song"
                    spellcheck="false"
                />
                <textarea
                    id="editor"
                    placeholder="Write the lyrics here..."
                ></textarea>
            </section>

            <section class="draft-zone">
                <h3>Scrap Board</h3>
                <textarea
                    id="scrap-pad"
                    placeholder="Rhymes, vibes, fragments..."
                ></textarea>
            </section>
        </div>

        <div class="footer">
            <button onclick="exportTxt()">Export Final Lyrics</button>
        </div>

        <script>
            const fields = ["title", "editor", "scrap-pad"];

            window.onload = () => {
                fields.forEach((id) => {
                    const saved = localStorage.getItem(`lyric_app_${id}`);
                    const element = document.getElementById(id);
                    if (element && saved) element.value = saved;
                    if (element) {
                        element.addEventListener("input", (e) =>
                            saveField(id, e.target.value),
                        );
                    }
                });
                setTheme(localStorage.getItem("lyric_app_theme") || "dark");
            };

            function saveField(id, value) {
                localStorage.setItem(`lyric_app_${id}`, value);
            }

            function setTheme(theme) {
                document.documentElement.setAttribute("data-theme", theme);
                localStorage.setItem("lyric_app_theme", theme);
                document.querySelectorAll(".theme-dot").forEach((dot) => {
                    dot.classList.toggle(
                        "active",
                        dot.getAttribute("onclick").includes(theme),
                    );
                });
            }

            // Drag and Drop Logic
            const body = document.body;

            window.addEventListener("dragover", (e) => {
                e.preventDefault();
                body.classList.add("drag-over");
            });

            window.addEventListener("dragleave", (e) => {
                if (e.relatedTarget === null)
                    body.classList.remove("drag-over");
            });

            window.addEventListener("drop", (e) => {
                e.preventDefault();
                body.classList.remove("drag-over");

                const file = e.dataTransfer.files[0];
                if (
                    (file && file.type === "text/plain") ||
                    file.name.endsWith(".txt")
                ) {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        parseImport(event.target.result);
                    };
                    reader.readAsText(file);
                }
            });

            function parseImport(content) {
                // Regex to pull sections based on the export format
                const songMatch = content.match(/SONG:\s*(.*)\n/);
                const lyricsMatch = content.match(
                    /LYRICS:\n([\s\S]*?)\n---\nSCRAP NOTES:/,
                );
                const scrapMatch = content.match(/SCRAP NOTES:\n([\s\S]*)$/);

                if (songMatch) {
                    document.getElementById("title").value =
                        songMatch[1].trim();
                    saveField("title", songMatch[1].trim());
                }
                if (lyricsMatch) {
                    document.getElementById("editor").value =
                        lyricsMatch[1].trim();
                    saveField("editor", lyricsMatch[1].trim());
                }
                if (scrapMatch) {
                    document.getElementById("scrap-pad").value =
                        scrapMatch[1].trim();
                    saveField("scrap-pad", scrapMatch[1].trim());
                }
            }

            window.addEventListener("beforeunload", (e) => {
                const hasContent = fields.some(
                    (id) =>
                        document.getElementById(id)?.value.trim().length > 0,
                );
                if (hasContent) {
                    e.preventDefault();
                    e.returnValue = "";
                }
            });

            function exportTxt() {
                const title =
                    document.getElementById("title").value || "Untitled";
                const bodyText = document.getElementById("editor").value;
                const scrap = document.getElementById("scrap-pad").value;
                const fileContent = `SONG: ${title}\n\nLYRICS:\n${bodyText}\n\n---\nSCRAP NOTES:\n${scrap}`;
                const blob = new Blob([fileContent], { type: "text/plain" });
                const url = URL.createObjectURL(blob);
                const a = document.createElement("a");
                a.href = url;
                a.download = `${title.toLowerCase().replace(/\s+/g, "_")}_draft.txt`;
                a.click();
            }
        </script>
    </body>
</html>
