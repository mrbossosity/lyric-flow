<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Lyric Flow</title>
        <link
            href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,700;1,400&family=Lexend:wght@300;500&family=Caveat:wght@400;700&family=Baskervville:ital@0;1&display=swap"
            rel="stylesheet"
        />
        <style>
            :root {
                --bg-gradient: linear-gradient(
                    135deg,
                    #1a1c2c 0%,
                    #4a192c 100%
                );
                --glass: rgba(255, 255, 255, 0.05);
                --text: #e0e0e0;
                --accent: #ff79c6;
                --draft-text: #9ca3af;
                --border: rgba(255, 255, 255, 0.1);
                --transition-speed: 0.4s;
                --scroll-thumb: rgba(255, 255, 255, 0.1);
            }

            [data-theme="light"] {
                --bg-gradient: linear-gradient(
                    135deg,
                    #f5f7fa 0%,
                    #c3cfe2 100%
                );
                --glass: rgba(255, 255, 255, 0.7);
                --text: #2d3436;
                --accent: #6c5ce7;
                --draft-text: #636e72;
                --border: rgba(0, 0, 0, 0.1);
                --scroll-thumb: rgba(0, 0, 0, 0.1);
            }

            [data-theme="zen"] {
                --bg-gradient: linear-gradient(
                    135deg,
                    #132620 0%,
                    #0a0f0d 100%
                );
                --glass: rgba(255, 255, 255, 0.03);
                --text: #d4d7c5;
                --accent: #a3b18a;
                --draft-text: #588157;
                --border: rgba(163, 177, 138, 0.2);
            }

            [data-theme="nordic"] {
                --bg-gradient: linear-gradient(
                    135deg,
                    #2e3440 0%,
                    #4c566a 100%
                );
                --glass: rgba(255, 255, 255, 0.05);
                --text: #eceff4;
                --accent: #88c0d0;
                --draft-text: #a3be8c;
                --border: rgba(255, 255, 255, 0.1);
            }

            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            body {
                background: var(--bg-gradient);
                background-attachment: fixed;
                color: var(--text);
                font-family: "Crimson Pro", serif;
                min-height: 100vh;
                display: flex;
                justify-content: center;
                overflow-y: auto;
                transition:
                    background var(--transition-speed) ease-in-out,
                    color var(--transition-speed) ease-in-out;
            }

            /* Global Slim Scrollbar for Textareas */
            #editor::-webkit-scrollbar,
            #scrap-pad::-webkit-scrollbar {
                width: 6px;
            }
            #editor::-webkit-scrollbar-track,
            #scrap-pad::-webkit-scrollbar-track {
                background: transparent;
            }
            #editor::-webkit-scrollbar-thumb,
            #scrap-pad::-webkit-scrollbar-thumb {
                background: var(--scroll-thumb);
                border-radius: 10px;
            }
            #editor::-webkit-scrollbar-thumb:hover,
            #scrap-pad::-webkit-scrollbar-thumb:hover {
                background: var(--accent);
            }

            body.drag-over .workspace {
                filter: blur(4px);
                transform: scale(0.98);
                pointer-events: none;
            }

            .theme-switcher {
                position: fixed;
                top: 1rem;
                right: 1rem;
                display: flex;
                gap: 0.5rem;
                z-index: 100;
                background: var(--glass);
                padding: 0.5rem;
                border-radius: 20px;
                backdrop-filter: blur(5px);
                border: 1px solid var(--border);
            }

            .theme-dot {
                width: 20px;
                height: 20px;
                border-radius: 50%;
                cursor: pointer;
                border: 2px solid transparent;
            }
            .theme-dot.active {
                border-color: var(--text);
            }

            .workspace {
                display: grid;
                grid-template-columns: 1fr;
                gap: 1.5rem;
                width: 95%;
                max-width: 1200px;
                padding: 4rem 0 5rem 0;
            }

            @media (min-width: 850px) {
                body {
                    overflow: hidden;
                }
                .workspace {
                    grid-template-columns: 1fr 300px;
                    height: 85vh;
                    align-self: center;
                    padding: 0;
                }
            }

            .main-zone {
                display: flex;
                flex-direction: column;
                position: relative;
                background: var(--glass);
                backdrop-filter: blur(10px);
                border-radius: 12px;
                padding: 1.5rem;
                border: 1px solid var(--border);
            }

            #title {
                background: transparent;
                border: none;
                outline: none;
                color: var(--accent);
                font-size: 1.8rem;
                font-weight: 700;
                margin-bottom: 1rem;
                width: 100%;
                font-family: inherit;
            }

            #editor {
                flex-grow: 1;
                background: transparent;
                border: none;
                outline: none;
                color: var(--text);
                font-size: 1.3rem;
                line-height: 1.7;
                resize: none;
                min-height: 300px;
                padding-bottom: 3rem;
            }

            .font-control {
                position: absolute;
                bottom: 1rem;
                right: 1rem;
                background: var(--glass);
                border: 1px solid var(--border);
                color: var(--text);
                font-size: 0.75rem;
                padding: 0.4rem;
                border-radius: 8px;
                outline: none;
                cursor: pointer;
                backdrop-filter: blur(5px);
            }

            .draft-zone {
                display: flex;
                flex-direction: column;
                background: rgba(0, 0, 0, 0.1);
                border-radius: 12px;
                padding: 1.2rem;
                border: 1px dashed var(--border);
            }

            .draft-zone h3 {
                font-size: 0.75rem;
                text-transform: uppercase;
                color: var(--draft-text);
                margin-bottom: 0.8rem;
                font-family: "Lexend", sans-serif;
            }

            #scrap-pad {
                flex-grow: 1;
                background: transparent;
                border: none;
                outline: none;
                color: var(--draft-text);
                font-size: 1rem;
                resize: none;
                font-family: "Crimson Pro", serif;
                font-style: italic;
                min-height: 150px;
            }

            #modal-overlay {
                display: none;
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: rgba(0, 0, 0, 0.7);
                backdrop-filter: blur(5px);
                z-index: 1000;
                justify-content: center;
                align-items: center;
            }
            .modal {
                background: #2a2d3e;
                padding: 2rem;
                border-radius: 15px;
                border: 1px solid var(--accent);
                max-width: 400px;
                text-align: center;
                color: white;
                font-family: "Lexend", sans-serif;
            }
            .modal h2 {
                color: var(--accent);
                margin-bottom: 1rem;
            }
            .modal-btns {
                display: flex;
                gap: 1rem;
                justify-content: center;
                margin-top: 1.5rem;
            }
            .btn-cancel {
                background: transparent;
                border: 1px solid var(--text);
                color: var(--text);
                border-radius: 20px;
                padding: 0.5rem 1rem;
                cursor: pointer;
            }

            .footer {
                position: fixed;
                bottom: 1.5rem;
                left: 50%;
                transform: translateX(-50%);
                z-index: 10;
            }
            button {
                background: var(--accent);
                color: #fff;
                border: none;
                padding: 0.8rem 1.8rem;
                border-radius: 30px;
                cursor: pointer;
                font-weight: 600;
                font-family: "Lexend", sans-serif;
            }
        </style>
    </head>
    <body>
        <div id="modal-overlay">
            <div class="modal">
                <h2 id="modal-filename">Import File?</h2>
                <p>Warning: This will overwrite your current progress.</p>
                <div class="modal-btns">
                    <button class="btn-cancel" onclick="closeModal()">
                        Cancel
                    </button>
                    <button
                        id="confirm-import-btn"
                        style="
                            background: var(--accent);
                            color: white;
                            border: none;
                            border-radius: 20px;
                            padding: 0.5rem 1rem;
                            cursor: pointer;
                            font-weight: bold;
                        "
                    >
                        Import
                    </button>
                </div>
            </div>
        </div>

        <div class="theme-switcher">
            <div
                class="theme-dot"
                style="background: #1a1c2c"
                onclick="setTheme('dark')"
            ></div>
            <div
                class="theme-dot"
                style="background: #f5f7fa"
                onclick="setTheme('light')"
            ></div>
            <div
                class="theme-dot"
                style="background: #132620"
                onclick="setTheme('zen')"
            ></div>
            <div
                class="theme-dot"
                style="background: #2e3440"
                onclick="setTheme('nordic')"
            ></div>
        </div>

        <div class="workspace">
            <section class="main-zone">
                <input
                    type="text"
                    id="title"
                    placeholder="Untitled Song"
                    spellcheck="false"
                />
                <textarea
                    id="editor"
                    placeholder="Write the lyrics here..."
                ></textarea>

                <select
                    class="font-control"
                    id="font-selector"
                    onchange="setFont(this.value)"
                >
                    <option value="'Crimson Pro', serif">
                        Crimson (Classic)
                    </option>
                    <option value="'Lexend', sans-serif">Lexend (Focus)</option>
                    <option value="'Caveat', cursive">
                        Caveat (Handwritten)
                    </option>
                    <option value="'Baskervville', serif">
                        Baskerville (Manuscript)
                    </option>
                </select>
            </section>

            <section class="draft-zone">
                <h3>Scrap Board</h3>
                <textarea
                    id="scrap-pad"
                    placeholder="Rhymes, vibes, fragments..."
                ></textarea>
            </section>
        </div>

        <div class="footer">
            <button onclick="exportTxt()">Export File</button>
        </div>

        <script>
            const fields = ["title", "editor", "scrap-pad"];
            let pendingFileContent = "";

            window.onload = () => {
                fields.forEach((id) => {
                    const saved = localStorage.getItem(`lyric_app_${id}`);
                    if (saved) document.getElementById(id).value = saved;
                    document
                        .getElementById(id)
                        .addEventListener("input", (e) =>
                            localStorage.setItem(
                                `lyric_app_${id}`,
                                e.target.value,
                            ),
                        );
                });
                setTheme(localStorage.getItem("lyric_app_theme") || "dark");
                setFont(
                    localStorage.getItem("lyric_app_font") ||
                        "'Crimson Pro', serif",
                );
            };

            function setTheme(theme) {
                document.documentElement.setAttribute("data-theme", theme);
                localStorage.setItem("lyric_app_theme", theme);
                document
                    .querySelectorAll(".theme-dot")
                    .forEach((dot) =>
                        dot.classList.toggle(
                            "active",
                            dot.getAttribute("onclick").includes(theme),
                        ),
                    );
            }

            function setFont(font) {
                const els = ["editor", "title", "scrap-pad"];
                els.forEach(
                    (id) =>
                        (document.getElementById(id).style.fontFamily = font),
                );
                document.getElementById("font-selector").value = font;
                localStorage.setItem("lyric_app_font", font);
            }

            window.addEventListener("dragover", (e) => {
                e.preventDefault();
                document.body.classList.add("drag-over");
            });
            window.addEventListener("dragleave", (e) => {
                if (e.relatedTarget === null)
                    document.body.classList.remove("drag-over");
            });
            window.addEventListener("drop", (e) => {
                e.preventDefault();
                document.body.classList.remove("drag-over");
                const file = e.dataTransfer.files[0];
                if (
                    file &&
                    (file.type === "text/plain" || file.name.endsWith(".txt"))
                ) {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        pendingFileContent = event.target.result;
                        document.getElementById("modal-filename").innerText =
                            `Import "${file.name}"?`;
                        document.getElementById("modal-overlay").style.display =
                            "flex";
                        document.getElementById("confirm-import-btn").onclick =
                            () => {
                                parseImport(pendingFileContent);
                                closeModal();
                            };
                    };
                    reader.readAsText(file);
                }
            });

            function closeModal() {
                document.getElementById("modal-overlay").style.display = "none";
                pendingFileContent = "";
            }

            function parseImport(content) {
                const songMatch = content.match(/SONG:\s*(.*)\n/);
                const lyricsMatch = content.match(
                    /LYRICS:\n([\s\S]*?)\n---\nSCRAP NOTES:/,
                );
                const scrapMatch = content.match(/SCRAP NOTES:\n([\s\S]*)$/);
                if (songMatch) updateField("title", songMatch[1].trim());
                if (lyricsMatch) updateField("editor", lyricsMatch[1].trim());
                if (scrapMatch) updateField("scrap-pad", scrapMatch[1].trim());
            }

            function updateField(id, val) {
                const el = document.getElementById(id);
                el.value = val;
                localStorage.setItem(`lyric_app_${id}`, val);
            }

            window.addEventListener("beforeunload", (e) => {
                if (
                    fields.some(
                        (id) =>
                            document.getElementById(id).value.trim().length > 0,
                    )
                ) {
                    e.preventDefault();
                    e.returnValue = "";
                }
            });

            function exportTxt() {
                const title =
                    document.getElementById("title").value || "Untitled";
                const fileContent = `SONG: ${title}\n\nLYRICS:\n${document.getElementById("editor").value}\n\n---\nSCRAP NOTES:\n${document.getElementById("scrap-pad").value}`;
                const blob = new Blob([fileContent], { type: "text/plain" });
                const a = document.createElement("a");
                a.href = URL.createObjectURL(blob);
                a.download = `${title.toLowerCase().replace(/\s+/g, "_")}_draft.txt`;
                a.click();
            }
        </script>
    </body>
</html>
